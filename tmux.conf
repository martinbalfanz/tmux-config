# ~/.tmux.conf
# =============================================================================
# QUICK REFERENCE
# =============================================================================
# Prefix key: C-a  (hold Ctrl, press a)
#
# Sessions & windows
#   C-a c          new window
#   C-a ,          rename window
#   C-a n / p      next / previous window
#   C-a <number>   jump to window by number
#   C-a d          detach from session
#   C-a $          rename session
#   C-a s          list / switch sessions
#
# Panes
#   C-a |          split pane vertically   (left/right)
#   C-a -          split pane horizontally (top/bottom)
#   M-arrow        move between panes — no prefix needed  (Alt + arrow key)
#   C-a x          close current pane
#   C-a z          zoom pane to fullscreen (press again to unzoom)
#
# Copy mode  (scroll, search, select text)
#   C-a [          enter copy mode
#   C-s / C-r      search forward / backward
#   C-space        start text selection
#   M-w            copy selection to clipboard
#   C-a ]          paste
#   q              exit copy mode
#   Mouse drag also selects and copies.  cmd+c / cmd+v work normally.
#
# Other
#   C-a r          reload this config file
#   C-a ?          show all keybindings
# =============================================================================


# -----------------------------------------------------------------------------
# Prefix
# -----------------------------------------------------------------------------

unbind C-b
set -g prefix C-a
bind C-a send-prefix   # C-a C-a sends a literal C-a to the terminal


# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------

set -g base-index 1          # number windows from 1
set -g pane-base-index 1     # number panes from 1
set -g renumber-windows on   # close a window → remaining windows renumber
set -g focus-events on       # let apps inside tmux know when they gain focus
set -g mouse on              # click to focus panes, scroll to enter copy mode
set -g set-clipboard on      # keep macOS cmd+c / cmd+v working
set -ag update-environment "SSH_TTY"
set -as terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000


# -----------------------------------------------------------------------------
# Key bindings
# -----------------------------------------------------------------------------

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Split panes with intuitive keys (and open in the current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Move between panes with Alt+arrow — no prefix needed
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Prefix + arrow keys (commented out — uncomment to use instead of M-arrow)
# bind Left  select-pane -L
# bind Right select-pane -R
# bind Up    select-pane -U
# bind Down  select-pane -D


# -----------------------------------------------------------------------------
# Copy mode — emacs style
# -----------------------------------------------------------------------------

set -g mode-keys emacs

# Enter copy mode with C-a [  (default, already set)
# In copy mode:
#   C-space  start selection
#   M-w      copy to clipboard
#   C-s/C-r  incremental search
#   q        exit


# -----------------------------------------------------------------------------
# Status bar
# -----------------------------------------------------------------------------

set -g status-position bottom
set -g status-style         'fg=colour145 bg=colour234'   # light-grey on very dark grey
set -g status-left          ' #[fg=colour255,bold]#S '
set -g status-left-length   20
set -g status-right         '#{prefix_highlight}#[fg=colour108]#{cpu_icon} #{cpu_percentage}  #[fg=colour109]#{battery_icon} #{battery_percentage}  #[fg=colour102]%Y-%m-%d  %H:%M '
set -g status-right-length  60

# Active window tab: brighter
setw -g window-status-current-style  'fg=colour255,bg=colour236,bold'
setw -g window-status-current-format ' #I:#W '

# Inactive window tabs
setw -g window-status-style  'fg=colour240,bg=colour234'
setw -g window-status-format ' #I:#W '


# -----------------------------------------------------------------------------
# Pane borders
# -----------------------------------------------------------------------------

set -g pane-border-style        'fg=colour236'
set -g pane-active-border-style 'fg=colour240'


# -----------------------------------------------------------------------------
# Clock  (C-a t)
# -----------------------------------------------------------------------------

setw -g clock-mode-colour colour75    # bright blue — readable on any dark bg
setw -g clock-mode-style  24          # 24-hour format


# -----------------------------------------------------------------------------
# Messages / prompts
# -----------------------------------------------------------------------------

set -g message-style 'fg=colour255,bg=colour236'


# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# https://github.com/hiroppy/tmux-agent-sidebar
set -g @plugin 'hiroppy/tmux-agent-sidebar'

# https://github.com/accessd/tmux-agent-indicator
# set -g @plugin 'accessd/tmux-agent-indicator'

# https://github.com/samleeney/tmux-agent-status
# set -g @plugin 'samleeney/tmux-agent-status'

# https://github.com/tmux-plugins/tmux-resurrect — save/restore session layout
set -g @plugin 'tmux-plugins/tmux-resurrect'

# https://github.com/tmux-plugins/tmux-continuum — autosave + autorestore on top of resurrect
set -g @plugin 'tmux-plugins/tmux-continuum'

# https://github.com/fcsonline/tmux-thumbs — jump-to-copy for URLs/paths/hashes on screen
set -g @plugin 'fcsonline/tmux-thumbs'

# https://github.com/sainnhe/tmux-fzf — fuzzy session/window/pane switcher & manager
set -g @plugin 'sainnhe/tmux-fzf'

# https://github.com/tmux-plugins/tmux-battery — battery % in status bar
set -g @plugin 'tmux-plugins/tmux-battery'

# https://github.com/tmux-plugins/tmux-cpu — CPU load in status bar
set -g @plugin 'tmux-plugins/tmux-cpu'

# https://github.com/tmux-plugins/tmux-prefix-highlight — status bar flags when prefix/copy-mode is active
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'


# -----------------------------------------------------------------------------
# Plugin options
# -----------------------------------------------------------------------------

# tmux-resurrect: also save pane scrollback content, not just layout
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum: auto-restore last saved layout when tmux server starts,
# and autosave every 15 minutes (no manual save needed day-to-day)
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-fzf: launch key is "prefix + F" (its built-in default). It reads the
# TMUX_FZF_LAUNCH_KEY shell env var to override, not a tmux option — export
# it in your shell rc file (before tmux starts) if you want to change it.

# tmux-battery: plain-text icons instead of emoji defaults. The stock
# "attached" (plugged in, not actively charging — normal macOS battery-health
# behavior) icon is a warning-sign emoji whose variation-selector byte tmux
# and the terminal disagree on the width of, which visually eats the space
# before the percentage. Text avoids the width bug and the false alarm.
set -g @batt_icon_status_charged     'FULL'
set -g @batt_icon_status_charging    'CHG'
set -g @batt_icon_status_discharging 'BAT'
set -g @batt_icon_status_attached    'AC'
set -g @batt_icon_status_unknown     '?'

# tmux-prefix-highlight: also flag when copy-mode is active, not just prefix
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_fg 'colour234'
set -g @prefix_highlight_bg 'colour75'

# tmux-agent-sidebar: fixed column width (not a percentage) so a sidebar
# created in one window doesn't end up a different absolute width than one
# created in another window at a different terminal size.
set -g @sidebar_width '30'


# -----------------------------------------------------------------------------
# Custom hooks
# -----------------------------------------------------------------------------

# Re-pin the agent-sidebar pane to @sidebar_width on every terminal resize.
# The plugin itself only sets the width once, at pane-creation time — without
# this, moving the terminal between displays/Spaces or toggling fullscreen
# lets tmux's normal proportional-resize behavior drift the sidebar's width.
set-hook -ga client-resized 'run-shell "~/.tmux/scripts/repin-sidebar-width.sh"'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
